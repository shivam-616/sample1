name: Aikido Release Gated Scan
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  aikido-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Workspace Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Aikido CI API Client
        run: npm install --global @aikidosec/ci-api-client

      - name: Run Aikido Scan
        run: |
          aikido-api-client scan-release ${{ github.event.repository.name }} $GITHUB_SHA \
          --apikey ${{secrets.AIKIDO_CLIENT_API_KEY}} \
          --fail-on-sast-scan \
          --fail-on-iac-scan \
          --fail-on-secrets-scan
build-and-push:
  needs: aikido-scan
  runs-on: ubuntu-latest
  # Only push the container when code successfully merges into main
  if: github.ref == 'refs/heads/main' && github.event_name == 'push'

  steps:
    - name: Fetch Workspace Code
      uses: actions/checkout@v4

    # Log into GitHub's built-in free container registry
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub!

    # Downcase the repository owner name to handle potential uppercase letters
    - name: Convert Repository Owner to Lowercase
      run: |
        echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    # Build and push your secure non-root image
    - name: Build and Push Docker Image
      run: |
        REGISTRY_URL="ghcr.io/${{ env.OWNER_LOWER }}/sample-service"
        IMAGE_TAG="${{ github.sha }}"
        
        docker build -t $REGISTRY_URL:$IMAGE_TAG -t $REGISTRY_URL:latest .
        
        docker push $REGISTRY_URL:$IMAGE_TAG
        docker push $REGISTRY_URL:latest