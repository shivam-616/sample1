name: CI Pipeline (Test, Scan, Build & Push)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 1. Run unit tests first (fast feedback)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # 2. Security scan
  aikido-scan:
    needs: test         # only scan if tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Aikido CI API Client
        run: npm install --global @aikidosec/ci-api-client

      - name: Run Aikido Scan
        run: |
          aikido-api-client scan-release ${{ github.event.repository.name }} $GITHUB_SHA \
          --apikey ${{secrets.AIKIDO_CLIENT_API_KEY}} \
          --fail-on-sast-scan \
          --fail-on-iac-scan \
          --fail-on-secrets-scan

  # 3. Build & push Docker image (only on push to main)
  build-and-push:
    needs: [test, aikido-scan]   # only after both tests and scan pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert Repository Owner to Lowercase
        run: |
          echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          REGISTRY_URL="ghcr.io/${{ env.OWNER_LOWER }}/sample-service"
          IMAGE_TAG="${{ github.sha }}"
          docker build -t $REGISTRY_URL:$IMAGE_TAG -t $REGISTRY_URL:latest .
          docker push $REGISTRY_URL:$IMAGE_TAG
          docker push $REGISTRY_URL:latest
